appId: com.projet.planto_app
---
# TC-008 : Inscription avec un mot de passe trop court (< 8 caractères)
- launchApp:
    clearState: true

- assertVisible:
    text: "PLANTO"

# Naviguer vers la page d'inscription
- tapOn:
    text: "[S'inscrire]"

- assertVisible:
    text: "Créer un compte"

# Remplir le nom
- tapOn:
    text: "Nom d'affichage"
- inputText: "Test User"

# Remplir l'email
- tapOn:
    text: "Adresse email"
- inputText: "nouveau@test.com"

# Saisir un mot de passe trop court (moins de 8 caractères)
- tapOn:
    text: "Mot de passe"
- inputText: "abc"

# Tenter de s'inscrire
- tapOn:
    text: "S'INSCRIRE"

# Vérifier le message d'erreur sur la longueur du mot de passe
- assertVisible:
    text: "Le mot de passe doit contenir au moins 8 caractères"
