appId: com.projet.planto_app
---
# TC-003 : Connexion avec un mauvais mot de passe — vérification du message d'erreur
- launchApp:
    clearState: true

- assertVisible:
    text: "PLANTO"

# Saisir un email valide
- tapOn:
    text: "Adresse email"
- inputText: "test@test.com"

# Saisir un mot de passe incorrect
- tapOn:
    text: "Mot de passe"
- inputText: "wrongpass"

# Tenter de se connecter
- tapOn:
    text: "SE CONNECTER"

# Vérifier qu'un message d'erreur apparaît (réponse serveur)
- assertVisible:
    text: "Identifiants invalides"
    optional: true

# Fallback : toute erreur affichée dans la zone rouge
- assertVisible:
    text: "Mot de passe"
