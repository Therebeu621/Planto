appId: com.projet.planto_app
---
# TC-014 : Basculer le mode sombre depuis la page Profil
- launchApp:
    clearState: true

- assertVisible:
    text: "PLANTO"

# Se connecter
- tapOn:
    text: "Adresse email"
- inputText: "test@test.com"

- tapOn:
    text: "Mot de passe"
- inputText: "password123"

- tapOn:
    text: "SE CONNECTER"

# Attendre la page d'accueil
- assertVisible:
    text: "PLANTO"

# Naviguer vers le Profil
- tapOn:
    text: "Profil"

- assertVisible:
    text: "Mon Profil"

# Faire défiler jusqu'à la section Paramètres
- scrollUntilVisible:
    element:
      text: "Mode sombre"
    direction: DOWN

# Vérifier que le toggle "Mode sombre" est présent
- assertVisible:
    text: "Mode sombre"

# Activer le mode sombre en tapant sur le SwitchListTile
- tapOn:
    text: "Mode sombre"

# Vérifier que l'app reste fonctionnelle après le changement de thème
- assertVisible:
    text: "Mon Profil"

# Désactiver le mode sombre (retour à la normale)
- tapOn:
    text: "Mode sombre"

- assertVisible:
    text: "Mon Profil"
