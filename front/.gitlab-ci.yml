stages:
  - test
  - build
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE/frontend
  KUBE_NAMESPACE: plant-manager

# ==================== TEST ====================
test:
  stage: test
  image: ghcr.io/cirruslabs/flutter:stable
  script:
    - flutter pub get
    - flutter analyze --no-fatal-infos
    - flutter test
  cache:
    paths:
      - .pub-cache/

# ==================== BUILD ====================
build-image:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA -t $DOCKER_IMAGE:latest .
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKER_IMAGE:latest
  only:
    - main
    - develop

# ==================== DEPLOY ====================
deploy-staging:
  stage: deploy
  image: alpine/helm:3.14
  before_script:
    - apk add --no-cache kubectl
  script:
    - helm upgrade --install plant-frontend ./helm/plant-frontend
        --namespace $KUBE_NAMESPACE
        --create-namespace
        --set image.repository=$DOCKER_IMAGE
        --set image.tag=$CI_COMMIT_SHORT_SHA
        --wait --timeout 300s
  environment:
    name: staging
    url: http://planto.etu-k8s.lan
  only:
    - develop

deploy-production:
  stage: deploy
  image: alpine/helm:3.14
  before_script:
    - apk add --no-cache kubectl
  script:
    - helm upgrade --install plant-frontend ./helm/plant-frontend
        --namespace $KUBE_NAMESPACE
        --create-namespace
        --set image.repository=$DOCKER_IMAGE
        --set image.tag=$CI_COMMIT_SHORT_SHA
        --set replicaCount=2
        --wait --timeout 300s
  environment:
    name: production
    url: http://planto.etu-k8s.lan
  when: manual
  only:
    - main
