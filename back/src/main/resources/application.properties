# Application
quarkus.application.name=plant-backend
quarkus.http.port=8080
quarkus.http.host=0.0.0.0
quarkus.http.root-path=/api/v1
quarkus.http.non-application-root-path=/q

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:plant_user}
quarkus.datasource.password=${DB_PASSWORD:plant_pass}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:plant_db}

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.repair-at-start=true
%dev.quarkus.flyway.baseline-on-migrate=true
%dev.quarkus.flyway.baseline-version=0
quarkus.flyway.locations=db/migration

# JWT Security
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=plant-management
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.new-token.lifespan=3600
smallrye.jwt.new-token.issuer=plant-management
jwt.access-token.expiration=3600
jwt.refresh-token.expiration=604800

# Trefle.io API (token optional - uses cache fallback if not set)
trefle.api.token=${TREFLE_API_TOKEN:}
trefle.cache.ttl-days=7
quarkus.rest-client.trefle-api.url=https://trefle.io/api/v1
quarkus.rest-client.trefle-api.scope=jakarta.inject.Singleton

# Perenual API for care recommendations (legacy, kept for fallback)
perenual.api.key=${PERENUAL_API_KEY:}
quarkus.rest-client.perenual-api.url=https://perenual.com/api
quarkus.rest-client.perenual-api.scope=jakarta.inject.Singleton

# Wikipedia API (French) for plant search
quarkus.rest-client.wikipedia-api.url=https://fr.wikipedia.org
quarkus.rest-client.wikipedia-api.scope=jakarta.inject.Singleton

# Gemini AI for plant enrichment
gemini.api.key=${GEMINI_API_KEY:}

# OpenWeatherMap API (weather-based watering intelligence)
openweather.api.key=${OPENWEATHER_API_KEY:}
openweather.default.city=${OPENWEATHER_DEFAULT_CITY:Paris}
quarkus.rest-client.openweather-api.url=https://api.openweathermap.org
quarkus.rest-client.openweather-api.scope=jakarta.inject.Singleton

# OpenAPI / Swagger
quarkus.smallrye-openapi.info-title=Plant Management API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API pour la gestion de plantes domestiques
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type

# Logging - Development (human-readable)
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.level=INFO
quarkus.log.category."com.plantmanager".level=DEBUG

# Logging - Production (JSON format for log aggregation)
%prod.quarkus.log.console.json=true
%prod.quarkus.log.console.json.pretty-print=false
%prod.quarkus.log.console.json.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSZ
%prod.quarkus.log.console.json.exception-output-type=formatted
%prod.quarkus.log.console.json.additional-field.service.value=plant-backend
%prod.quarkus.log.console.json.additional-field.environment.value=${ENVIRONMENT:production}
%prod.quarkus.log.level=INFO
%prod.quarkus.log.category."com.plantmanager".level=INFO

# Health checks (endpoints at /q/health/live and /q/health/ready)
quarkus.datasource.health.enabled=false
# We use custom DatabaseHealthCheck instead of built-in

# Photo storage (dev uses local folder, prod uses /app/photos)
%dev.plant.photos.storage-path=photos
plant.photos.storage-path=${PHOTOS_PATH:/app/photos}
plant.photos.max-size-mb=5
plant.photos.cleanup-delay-hours=1

# MCP (Model Context Protocol) - LLM Integration
mcp.api.key=${MCP_API_KEY:}
mcp.default.user.email=${MCP_DEFAULT_USER_EMAIL:}

# Firebase Cloud Messaging (push notifications)
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:firebase-service-account.json}

# Email (SMTP) - Password reset & email verification
# Local/dev fallback stays mock-safe; real SMTP must be provided explicitly in deployed environments.
quarkus.mailer.from=${MAIL_FROM:noreply@plantmanager.local}
quarkus.mailer.host=${MAIL_HOST:localhost}
quarkus.mailer.port=${MAIL_PORT:587}
quarkus.mailer.start-tls=${MAIL_START_TLS:DISABLED}
quarkus.mailer.username=${MAIL_USERNAME:}
quarkus.mailer.password=${MAIL_PASSWORD:}
quarkus.mailer.mock=false
%test.quarkus.mailer.mock=true
%dev.quarkus.mailer.mock=true

# Password reset
password.reset.expiration-minutes=30

# Email verification
email.verification.expiration-minutes=15

# Smart Notifications - Watering reminders (daily at 8:00 AM)
watering.reminder.cron=${WATERING_REMINDER_CRON:0 0 8 * * ?}
# Smart Notifications - Care reminders (every Monday at 9:00 AM)
care.reminder.cron=${CARE_REMINDER_CRON:0 0 9 ? * MON}
