# ==============================================
# Test Configuration for Plant Management API
# ==============================================

# Application
quarkus.application.name=plant-backend
quarkus.http.port=8080
quarkus.http.test-port=0
quarkus.http.root-path=/api/v1

# Database (PostgreSQL - same as dev/prod)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:plant_user}
quarkus.datasource.password=${DB_PASSWORD:plant_pass}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:plant_db}

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway - auto-run migrations
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# JWT Security (same keys as main)
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=plant-management
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.new-token.lifespan=3600
smallrye.jwt.new-token.issuer=plant-management
jwt.access-token.expiration=3600
jwt.refresh-token.expiration=604800

# APIs (can use same tokens as dev)
trefle.api.token=${TREFLE_API_TOKEN:test-token}
trefle.cache.ttl-days=7
quarkus.rest-client.trefle-api.url=https://trefle.io/api/v1
quarkus.rest-client.trefle-api.scope=jakarta.enterprise.context.ApplicationScoped

perenual.api.key=${PERENUAL_API_KEY:}
quarkus.rest-client.perenual-api.url=https://perenual.com/api
quarkus.rest-client.perenual-api.scope=jakarta.enterprise.context.ApplicationScoped

quarkus.rest-client.wikipedia-api.url=https://fr.wikipedia.org
quarkus.rest-client.wikipedia-api.scope=jakarta.enterprise.context.ApplicationScoped

# OpenWeatherMap API (empty key = skip real HTTP calls in tests)
openweather.api.key=
openweather.default.city=Paris
quarkus.rest-client.openweather-api.url=https://api.openweathermap.org
quarkus.rest-client.openweather-api.scope=jakarta.enterprise.context.ApplicationScoped
quarkus.rest-client.openweather-api.connect-timeout=2000
quarkus.rest-client.openweather-api.read-timeout=2000

gemini.api.key=${GEMINI_API_KEY:}

# MCP
mcp.api.key=${MCP_API_KEY:test-mcp-key}

# File storage (test uses isolated target folder)
plant.photos.storage-path=target/test-photos
plant.photos.max-size-mb=5
plant.photos.cleanup-delay-hours=1

# Mailer (mock in test mode)
quarkus.mailer.mock=true

# JaCoCo - preserve exec file across test forks (reuseForks=false)
quarkus.jacoco.reuse-data-file=true

# Logging - minimize noise during tests
quarkus.log.level=WARN
quarkus.log.category."com.plantmanager".level=INFO

# Health checks
quarkus.datasource.health.enabled=false

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type
