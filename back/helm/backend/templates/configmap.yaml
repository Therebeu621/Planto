apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "plant-backend.fullname" . }}-config
  labels:
    {{- include "plant-backend.labels" . | nindent 4 }}
data:
  DB_HOST: {{ .Values.postgresql.host | quote }}
  DB_PORT: {{ .Values.postgresql.port | quote }}
  DB_NAME: {{ .Values.postgresql.database | quote }}
  DB_USER: {{ .Values.postgresql.username | quote }}
  JWT_ISSUER: {{ .Values.security.jwtIssuer | quote }}
  JWT_ACCESS_EXPIRATION: {{ .Values.security.accessTokenExpiration | quote }}
  JWT_REFRESH_EXPIRATION: {{ .Values.security.refreshTokenExpiration | quote }}
  ENVIRONMENT: {{ .Values.app.environment | quote }}
  PHOTOS_PATH: {{ .Values.app.photosPath | quote }}
  PHOTOS_MAX_SIZE_MB: {{ .Values.app.photosMaxSizeMb | quote }}
  OPENWEATHER_DEFAULT_CITY: {{ .Values.apis.openweatherDefaultCity | quote }}
  MCP_DEFAULT_USER_EMAIL: {{ .Values.mcp.defaultUserEmail | quote }}
  FIREBASE_CREDENTIALS_PATH: {{ .Values.firebase.credentialsPath | quote }}
{{- if .Values.mail.host }}
  MAIL_HOST: {{ .Values.mail.host | quote }}
  MAIL_PORT: {{ .Values.mail.port | quote }}
  MAIL_START_TLS: {{ .Values.mail.startTls | quote }}
{{- with .Values.mail.from }}
  MAIL_FROM: {{ . | quote }}
{{- end }}
{{- with .Values.mail.username }}
  MAIL_USERNAME: {{ . | quote }}
{{- end }}
{{- end }}
